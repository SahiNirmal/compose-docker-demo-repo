name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Debug secrets (to verify they are available)
      - name: Debug secrets
        run: |
          echo "==== DEBUG START ===="
          if [ -z "$DOCKER_USERNAME" ]; then echo "USERNAME is EMPTY"; else echo "USERNAME is SET"; fi
          if [ -z "$DOCKER_PASSWORD" ]; then echo "PASSWORD is EMPTY"; else echo "PASSWORD is SET"; fi
          echo "==== DEBUG END ===="
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:latest .

      # 5. Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-app:latest
